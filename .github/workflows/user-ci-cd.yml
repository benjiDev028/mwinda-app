name: User Service CI/CD

on:
  pull_request:
    branches:
      - "release/1.0.0-dev"
    paths:
      - "-user/**"
      - "docker-compose.yml"
      - ".env.user.ci.example"
      - ".github/workflows/user-ci-cd.yml"

  push:
    branches:
      - "master"
    paths:
      - "mwinda-user/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/user-ci-cd.yml"

  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI env file
        run: cp .env.user.ci.example .env.user.local

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for API (smoke test)
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8003/health > /dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Still not ready... ($i)"
            sleep 3
          done
          echo "API did not start in time"
          docker compose ps
          docker compose logs mwinda_user
          exit 1

      

      - name: Down
        if: always()
        run: docker compose down -v

  build_and_push:
    if: github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: benjidev028
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: ./mwinda-user
          file: ./mwinda-user/dockerfile
          push: true
          tags: |
            ghcr.io/benjidev028/mwinda-user:${{ github.ref_name }}
            ghcr.io/benjidev028/mwinda-user:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/mwinda

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u benjidev028 --password-stdin

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
